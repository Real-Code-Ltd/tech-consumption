name: Release Windows Installer
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest]
    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm install

      - name: Download Npcap SDK
        run: |
          Invoke-WebRequest -Uri "https://npcap.com/dist/npcap-sdk-1.13.zip" -OutFile "npcap-sdk.zip"
          Expand-Archive -Path "npcap-sdk.zip" -DestinationPath "C:/npcap-sdk" -Force

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LIB: "C:/npcap-sdk/Lib/x64"
          NPCAP_SDK_PATH: "C:/npcap-sdk"
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Real Code Ltd AI Tracker ${{ github.ref_name }}'
          releaseBody: 'See the attached Windows Installer (.msi) release.'
          releaseDraft: false
          prerelease: false
